conexion.nombre           OSMOAUTENTICADOR

# --------------------------------------------------------
operaciones:1.nombre             usuarios
operaciones:1.consulta.sql       select t.login, r.id_rol, r.nombre nombre_rol, d.id_dependencia,  d.nombre nombre_dependencia from oat_usuario t inner join oat_usuario_rol ur on t.id_usuario = ur.id_usuario and ur.estado = 'A' and ( #id_rol# is null or ur.id_rol = #id_rol#) inner join oat_rol r on r.id_rol = ur.id_rol left join oat_dependencia d on d.id_dependencia = ur.id_dependencia where #login# is null or upper(t.login) = upper(#login#) order by 1,3,5

operaciones:1.parametros:1.nombre        login
operaciones:1.parametros:1.tipo          string

operaciones:1.parametros:2.nombre        id_rol
operaciones:1.parametros:2.tipo          int

# --------------------------------------------------------

operaciones:1.resultados:2.nombre        login
operaciones:1.resultados:2.tipo          string

operaciones:1.resultados:3.nombre        id_rol
operaciones:1.resultados:3.tipo          int

operaciones:1.resultados:4.nombre        nombre_rol
operaciones:1.resultados:4.tipo          string

operaciones:1.resultados:5.nombre        id_dependencia
operaciones:1.resultados:5.tipo          int
   
operaciones:1.resultados:6.nombre        nombre_dependencia
