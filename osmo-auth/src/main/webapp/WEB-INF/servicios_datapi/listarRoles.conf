operaciones:1.nombre                     listarRolesUsuario
operaciones:1.consulta.sql               SELECT  oat_rol.id_rol as id_rol, oat_rol.nombre as nombre_rol  FROM oat_rol inner join oat_usuario_rol on oat_rol.id_rol = oat_usuario_rol.id_rol and oat_usuario_rol.id_usuario = #idUsuario# and oat_usuario_rol.estado = 'A'

operaciones:1.parametros:1.nombre        idUsuario
operaciones:1.parametros:1.tipo          string

operaciones:1.resultados:1.nombre        id_rol
operaciones:1.resultados:1.tipo          string

operaciones:1.resultados:2.nombre        nombre_rol
operaciones:1.resultados:2.tipo          string

# --------------------------------------------------------

operaciones:2.nombre                     listarRoles
operaciones:2.consulta.sql               SELECT r.id_rol, r.nombre, r.dependencia FROM oav_rol r where aplicacion = #aplicacion#

operaciones:2.consulta.subconsulta:0.nombre     servicios
operaciones:2.consulta.subconsulta:0.sql         SELECT sr.id_servicio as id_servicio from oat_servicio_rol sr, oat_servicio se  where sr.id_servicio = se.id_servicio and sr.id_rol=#id_rol#

operaciones:2.parametros:1.nombre        aplicacion
operaciones:2.parametros:1.tipo          string

operaciones:2.resultados:1.nombre        id_rol
operaciones:2.resultados:1.tipo          string

operaciones:2.resultados:2.nombre        nombre
operaciones:2.resultados:2.tipo          string

operaciones:2.resultados:3.nombre        dependencia
operaciones:2.resultados:3.tipo          string

operaciones:2.resultados:4.nombre        servicios
operaciones:2.resultados:4.tipo          subquery

operaciones:2.resultados:4.elementos:0.nombre        id_servicio
operaciones:2.resultados:4.elementos:0.tipo          int

