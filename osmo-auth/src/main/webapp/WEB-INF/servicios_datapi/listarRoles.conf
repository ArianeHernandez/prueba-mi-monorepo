operaciones:3.nombre                     listarServicioRol
operaciones:3.consulta.sql               SELECT sr.id_servicio as id_servicio, se.nombre as nombre from oat_servicio_rol sr, oat_servicio se  where sr.id_servicio = se.id_servicio and sr.id_rol=#id_rol# and se.activo = 'S'

operaciones:3.parametros:1.nombre        id_rol
operaciones:3.parametros:1.tipo          string

