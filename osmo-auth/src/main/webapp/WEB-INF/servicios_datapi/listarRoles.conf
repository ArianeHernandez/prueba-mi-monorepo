operaciones:4.nombre                     listarRolesporLogin
operaciones:4.consulta.sql               SELECT ur.id_rol, r.nombre, ur.id_dependencia FROM oat_usuario u, oat_usuario_rol ur, oat_rol r WHERE u.id_usuario = ur.id_usuario AND ur.id_rol = r.id_rol AND upper(u.login) = upper(#login#) and ur.estado = 'A' ORDER BY u.login ASC 

operaciones:4.parametros:1.nombre        login
operaciones:4.parametros:1.tipo          string

operaciones:4.resultados:1.nombre        id_rol
operaciones:4.resultados:1.tipo          string

operaciones:4.resultados:2.nombre        nombre
operaciones:4.resultados:2.tipo          string

operaciones:4.resultados:3.nombre        id_dependencia
operaciones:4.resultados:3.tipo          string

# --------------------------------------------------------

operaciones:5.nombre                     eliminarRolesporLogin
operaciones:5.consulta.sql               DELETE FROM oat_usuario_rol WHERE id_usuario = (select id_usuario from oat_usuario t where upper(login)=upper(#login#)) AND id_rol=#idrol#

operaciones:5.parametros:1.nombre        login
operaciones:5.parametros:1.tipo          string

operaciones:5.parametros:2.nombre        idrol
operaciones:5.parametros:2.tipo          string

# --------------------------------------------------------

operaciones:6.nombre                     insertarRolesporLogin
operaciones:6.consulta.sql               INSERT INTO oat_usuario_rol (id_usuario,id_rol) SELECT oat_usuario.id_usuario, #idrol#  FROM oat_usuario  WHERE upper(oat_usuario.login)=upper(#login#)

operaciones:6.parametros:1.nombre        login
operaciones:6.parametros:1.tipo          string

operaciones:6.parametros:2.nombre        idrol
operaciones:6.parametros:2.tipo          string

