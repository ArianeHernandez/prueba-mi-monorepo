operaciones:8.nombre                     autorizacion
operaciones:8.consulta.sql               select decode(count(1), 0, 'N','S') autorizado from oat_aplicacion a, oat_rol r, oat_servicio_rol sr, oat_servicio s, oat_url_servicio urs, oat_usuario u, oat_usuario_rol  ur where upper(u.login) = upper(#login#) and u.id_usuario = ur.id_usuario and ur.estado = 'A' and (ur.id_dependencia is null and #dependencia# is null or ur.id_dependencia = #dependencia#) and ur.id_rol = r.id_rol and r.id_aplicacion = a.id_aplicacion and a.nombre = #aplicacion# and r.id_rol = sr.id_rol and s.activo = 'S' and s.id_servicio = urs.id_servicio and urs.url = #url#

operaciones:8.parametros:1.nombre        aplicacion
operaciones:8.parametros:1.tipo          string

operaciones:8.parametros:2.nombre        login
operaciones:8.parametros:2.tipo          string

operaciones:8.parametros:3.nombre        url
operaciones:8.parametros:3.tipo          string

operaciones:8.parametros:4.nombre        dependencia
operaciones:8.parametros:4.tipo          string

operaciones:8.resultados:1.nombre        autorizado
operaciones:8.resultados:1.tipo          string

