################
# --------------------------------------------------------
nombre     	gruposgiro_cuentas

id			gruposgiro_cuentas

consulta 		SELECT $CUENTA - BANCO$.ID ID_REGISTRO, $CUENTA - BANCO.CODIGO$ CODIGO, $CUENTA - BANCO.CUENTA BANCARIA$ NUMERO_CUENTA FROM $CUENTA - BANCO$ WHERE $CUENTA - BANCO.BANCO$ = #id_banco# AND IDCARGA = 0 AND $CUENTA - BANCO.PRODUCTO$ = #producto# ORDER BY $CUENTA - BANCO.CODIGO$, $CUENTA - BANCO.CUENTA BANCARIA$  

nombre_conexion           CREADATOS

# --------------------------------------------------------
parametros:0.nombre 		id_banco
parametros:0.tipo 			integer

parametros:1.nombre 		producto
parametros:1.tipo 			integer

resultados:1.nombre			id_registro
resultados:1.tipo			integer
resultados:1.orden			1

resultados:2.nombre			codigo
resultados:2.tipo			string
resultados:2.orden			2
resultados:2.encriptado		S

resultados:3.nombre			numero_cuenta
resultados:3.tipo			string
resultados:3.orden			3
resultados:3.encriptado		S
