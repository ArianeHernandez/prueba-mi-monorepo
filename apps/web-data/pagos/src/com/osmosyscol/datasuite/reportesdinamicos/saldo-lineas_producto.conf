consulta	SELECT * FROM  ( SELECT ID ID_INTERNO,  $LINEA DE PRODUCTO.ID$ ID_LINEA_PRODUCTO, $LINEA DE PRODUCTO.NOMBRE$ NOMBRE ,   ( SELECT COUNT(1) FROM $PRODUCTO$  INNER JOIN $ENCARGO$ ON $ENCARGO.PRODUCTO$ = $PRODUCTO$.ID WHERE $PRODUCTO.LINEA DE PRODUCTO$ = $LINEA DE PRODUCTO$.ID AND  $ENCARGO.ID CLIENTE$ = $I(#id_usuario#)$ AND $PRODUCTO.ACTIVO$ = $B(true)$ AND $ENCARGO.ACTIVO$ = $B(true)$   ) PRODUCTOS  FROM $LINEA DE PRODUCTO$ WHERE $LINEA DE PRODUCTO.ACTIVO$ = $B(true)$  )  T WHERE PRODUCTOS > 0 		
#SELECT * FROM (SELECT ID ID_INTERNO, $LINEA DE PRODUCTO.ID$ ID_LINEA_PRODUCTO, $LINEA DE PRODUCTO.NOMBRE$ NOMBRE , (SELECT COUNT(1) FROM $PRODUCTO$ WHERE $PRODUCTO.LINEA DE PRODUCTO$ = $LINEA DE PRODUCTO$.ID) PRODUCTOS FROM $LINEA DE PRODUCTO$ ) T WHERE PRODUCTOS > 0

