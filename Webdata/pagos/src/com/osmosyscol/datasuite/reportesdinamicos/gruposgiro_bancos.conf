nombre     	gruposgiro_bancos

id			gruposgiro_bancos

consulta	SELECT  distinct $BANCO$.ID ID_REGISTRO,  $BANCO.CODIGO$ CODIGO,  $BANCO.NOMBRE$ NOMBRE  FROM $CUENTA - BANCO$ INNER JOIN $BANCO$ ON $CUENTA - BANCO.BANCO$ = $BANCO$.ID WHERE $CUENTA - BANCO$.IDCARGA = 0 AND $BANCO$.IDCARGA = 0 AND $CUENTA - BANCO.PRODUCTO$ = #producto# AND NVl($BANCO.ESTADO$,$S(A)$) <> $S(I)$ ORDER BY $BANCO.CODIGO$, $BANCO.NOMBRE$

nombre_conexion           CREADATOS

# --------------------------------------------------------

parametros:0.nombre 		producto
parametros:0.tipo 			integer

resultados:1.nombre			id_registro
resultados:1.tipo			integer
resultados:1.orden			1

resultados:2.nombre			codigo
resultados:2.tipo			string
resultados:2.orden			2
resultados:2.encriptado		S

resultados:3.nombre			nombre
resultados:3.tipo			string
resultados:3.orden			3
resultados:3.encriptado		S

