titulo     	titulo

nombre     	Administrador de registro

id			administracioncarga_3b_1

consulta 	select #id_neg# id_neg, sc.*,(sc.pendientes_aprobar + pendientes_ejecutar) pendientes_total from ( select p.id_proceso, p.id_negocio, p.nombre, p.id_formato_salida, (select count(DISTINCT cs.id_carga) from dst_carga cs where cs.id_negocio = #id_neg# and cs.id_proceso = p.id_proceso and cs.estado in ('S')) pendientes_aprobar, (select count(DISTINCT cs.id_carga) from dst_carga cs where cs.id_negocio = #id_neg# and cs.id_proceso = p.id_proceso and cs.estado in ('C')) pendientes_ejecutar from dst_proceso p where (p.id_negocio = #id_neg# or p.id_negocio is null) and p.estado = 'A') sc order by pendientes_total desc, sc.nombre

 
nombre_conexion           DATASUITE

