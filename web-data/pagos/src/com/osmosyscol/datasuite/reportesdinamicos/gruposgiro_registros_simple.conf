parametros:0.nombre 		id_carga
parametros:0.tipo 			integer

parametros:1.nombre 		estado_nuevo
parametros:1.tipo 			string
parametros:1.encriptado		S

parametros:2.nombre 		inicio
parametros:2.tipo 			integer

parametros:3.nombre 		registros
parametros:3.tipo 			integer

resultados:5.nombre			id_registro
resultados:5.tipo			integer
resultados:5.orden			5

resultados:14.nombre		cuenta_id_defecto
resultados:14.tipo			integer

resultados:16.nombre		id_cuenta
resultados:16.tipo			integer
